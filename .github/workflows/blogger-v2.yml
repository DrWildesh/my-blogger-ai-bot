name: Staggered Multi-Blog AI Network

on:
  schedule:
    - cron: '0 * * * *'  # Runs systematically every 60 minutes, 24/7
  workflow_dispatch:

jobs:
  run-network:
    runs-on: ubuntu-latest

    steps:
      # 1. Sync Repo (Upgraded to v6 for full Node 24 support)
      - name: Sync Repo
        uses: actions/checkout@v6

      # 2. Initialize Runtime (Upgraded to v6 for Node 24 support)
      - name: Initialize Runtime
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          # FIXED: Removed cache: 'pip' because your repo is missing a requirements.txt file.
          # This prevents the runner from crashing during initialization.

      # 3. Install Runtime Dependencies
      - name: Install Google Suite and Gemini Libraries
        run: |
          python -m pip install --upgrade pip
          pip install google-generativeai google-api-python-client google-auth-httplib2 google-auth

      # 4. Execute Routing Script
      - name: Execute Routing Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python main.py
