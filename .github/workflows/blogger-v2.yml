name: Staggered Multi-Blog AI Network

on:
  schedule:
    - cron: '0 * * * *'  # Runs systematically every 60 minutes, 24/7
  workflow_dispatch:

jobs:
  run-network:
    runs-on: ubuntu-latest

    steps:
      - name: Sync Repo
        # FIXED: Upgraded from v4 to v6 to natively run on Node 24
        uses: actions/checkout@v6

      - name: Initialize Runtime
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          # FIXED: Target the exact path of your requirements file if using pip cache
          cache: 'pip'
          cache-dependency-path: '**/requirements.txt' 

      - name: Install Google Suite and Gemini Libraries
        # FIXED: Generates an on-the-fly requirements file so the pip cache engine has a valid target
        run: |
          python -m pip install --upgrade pip
          echo "google-generativeai\ngoogle-api-python-client\ngoogle-auth-httplib2\ngoogle-auth" > requirements.txt
          pip install -r requirements.txt

      - name: Execute Routing Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python main.py
