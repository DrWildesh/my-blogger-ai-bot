name: Staggered Multi-Blog AI Network

on:
  schedule:
    - cron: '0 * * * *'  # Runs systematically every 60 minutes, 24/7
  workflow_dispatch:

jobs:
  run-network:
    runs-on: ubuntu-latest

    steps:
      - name: Sync Repo
        uses: actions/checkout@v6

      # FIX 1: Generate requirements.txt FIRST so the cache engine can find it
      - name: Generate Requirements File
        run: |
          printf "google-generativeai\ngoogle-api-python-client\ngoogle-auth-httplib2\ google-auth\n" > requirements.txt

      - name: Initialize Runtime
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # FIX 2: Set environment variable to suppress the forced Node 24 warning
      - name: Install Google Suite and Gemini Libraries
        env:
          NODE_OPTIONS: "--no-warnings"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute Routing Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python main.py
