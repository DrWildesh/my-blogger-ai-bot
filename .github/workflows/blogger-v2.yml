name: Staggered Multi-Blog AI Network

on:
  schedule:
    - cron: '0 * * * *'  # Runs systematically every 60 minutes, 24/7
  workflow_dispatch:

jobs:
  run-network:
    runs-on: ubuntu-latest

    steps:
      - name: Sync Repo
        uses: actions/checkout@v6

      # FIXED: Uses standard echo statements to safely generate a clean requirements.txt
      - name: Generate Requirements File
        run: |
          echo "google-generativeai" > requirements.txt
          echo "google-api-python-client" >> requirements.txt
          echo "google-auth-httplib2" >> requirements.txt
          echo "google-auth" >> requirements.txt

      - name: Initialize Runtime
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Google Suite and Gemini Libraries
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute Routing Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python main.py
